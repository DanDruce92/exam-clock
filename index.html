<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exam Clock</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f0f0f0;
      color: #1a1a1a;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      transition: background 0.3s, color 0.3s;
    }

    body.dark {
      background: #2c2c2c;
      color: #e8e8e8;
    }

    /* ── Nav ── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.45rem 1rem;
      background: #fff;
      border-bottom: 1px solid #ddd;
      flex-shrink: 0;
      transition: background 0.3s, border-color 0.3s;
    }
    body.dark nav { background: #383838; border-color: #4a4a4a; }

    .pill-group {
      display: flex;
      background: #ebebeb;
      border-radius: 7px;
      padding: 3px;
      gap: 2px;
    }
    body.dark .pill-group { background: #2c2c2c; }

    .pill-btn {
      padding: 0.28rem 0.85rem;
      border: none;
      background: transparent;
      border-radius: 5px;
      font-size: 0.82rem;
      cursor: pointer;
      color: #666;
      transition: background 0.15s, color 0.15s;
    }
    .pill-btn.active { background: #fff; color: #1a1a1a; box-shadow: 0 1px 3px rgba(0,0,0,.12); }
    body.dark .pill-btn { color: #999; }
    body.dark .pill-btn.active { background: #505050; color: #e8e8e8; box-shadow: none; }

    #btn-fs {
      padding: 0.28rem 0.85rem;
      border: 1px solid #ccc;
      background: transparent;
      border-radius: 6px;
      font-size: 0.82rem;
      cursor: pointer;
      color: inherit;
    }
    body.dark #btn-fs { border-color: #555; }

    /* ── Clock area ── */
    #clock-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.75rem;
      min-height: 0;
    }

    .clock-page { display: none; width: 100%; height: 100%; align-items: center; justify-content: center; }
    .clock-page.active { display: flex; }

    #analog-wrap { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
    #analog-canvas { display: block; }

    #digital-wrap { text-align: center; }
    #digital-time {
      font-size: clamp(4rem, 16vw, 13rem);
      font-weight: 200;
      letter-spacing: 0.04em;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }
    #digital-date {
      margin-top: 0.4rem;
      font-size: clamp(0.9rem, 2.2vw, 1.7rem);
      font-weight: 300;
      color: #999;
      letter-spacing: 0.06em;
    }

    /* ── Calculator panel ── */
    #calc-panel {
      flex-shrink: 0;
      background: #fff;
      border-top: 1px solid #ddd;
      padding: 0.65rem 1.1rem;
      transition: background 0.3s, border-color 0.3s;
    }
    body.dark #calc-panel { background: #383838; border-color: #4a4a4a; }

    .calc-row {
      display: flex;
      align-items: flex-end;
      gap: 0.8rem;
      flex-wrap: wrap;
    }

    .calc-mode-toggle {
      display: flex;
      background: #f0f0f0;
      border-radius: 6px;
      padding: 2px;
      gap: 2px;
      align-self: flex-end;
    }
    body.dark .calc-mode-toggle { background: #2c2c2c; }

    .mode-btn {
      padding: 0.25rem 0.65rem;
      border: none;
      background: transparent;
      border-radius: 4px;
      font-size: 0.75rem;
      cursor: pointer;
      color: #777;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
    }
    .mode-btn.active { background: #fff; color: #1a1a1a; box-shadow: 0 1px 2px rgba(0,0,0,.1); }
    body.dark .mode-btn { color: #888; }
    body.dark .mode-btn.active { background: #505050; color: #e8e8e8; }

    .field { display: flex; flex-direction: column; gap: 0.2rem; }
    .field label { font-size: 0.68rem; color: #888; letter-spacing: 0.08em; text-transform: uppercase; }
    body.dark .field label { color: #aaa; }

    .field input[type="time"],
    .field input[type="number"] {
      padding: 0.3rem 0.45rem;
      border: 1px solid #d0d0d0;
      border-radius: 5px;
      font-size: 0.9rem;
      font-variant-numeric: tabular-nums;
      background: #fafafa;
      color: #1a1a1a;
      outline: none;
    }
    body.dark .field input[type="time"],
    body.dark .field input[type="number"] {
      background: #2a2a2a;
      border-color: #555;
      color: #e8e8e8;
      color-scheme: dark;
    }
    .field input[type="number"] { width: 3.8rem; }
    .field input[type="time"]   { width: 7.5rem; }

    .dur-row { display: flex; align-items: center; gap: 0.25rem; }
    .dur-row span { font-size: 0.75rem; color: #888; }

    #btn-calc {
      padding: 0.35rem 1rem;
      border: none;
      background: #1a1a1a;
      color: #fff;
      border-radius: 5px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      align-self: flex-end;
    }
    body.dark #btn-calc { background: #e0e0e0; color: #1a1a1a; }

    /* Results grid */
    #results-grid {
      display: none;
      margin-top: 0.6rem;
      gap: 0.5rem;
    }
    #results-grid.show { display: grid; grid-template-columns: repeat(3, 1fr); }

    .res-card {
      border: 1px solid #e0e0e0;
      border-radius: 7px;
      padding: 0.4rem 0.7rem;
      background: #fafafa;
    }
    body.dark .res-card { background: #2a2a2a; border-color: #4a4a4a; }

    .res-type {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #888;
      margin-bottom: 0.3rem;
    }
    body.dark .res-type { color: #999; }

    .res-row {
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
    }

    .res-block { display: flex; flex-direction: column; }
    .res-lbl { font-size: 0.6rem; color: #aaa; text-transform: uppercase; letter-spacing: 0.07em; }
    body.dark .res-lbl { color: #777; }
    .res-val {
      font-size: 1.05rem;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }

    .res-arrow { color: #bbb; font-size: 0.9rem; padding: 0 0.1rem; }

    /* Fullscreen: hide everything except clock */
    body.dark.fs-mode nav,
    body.dark.fs-mode #calc-panel { display: none; }

    /* Fullscreen results overlay */
    #fs-bar {
      display: none;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(4px);
      padding: 0.6rem 1.5rem;
      gap: 1rem;
      z-index: 20;
      grid-template-columns: repeat(3, 1fr);
    }
    #fs-bar.show { display: grid; }

    .fs-card { text-align: center; }
    .fs-card .fc-type { font-size: 0.62rem; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.2rem; }
    .fs-card .fc-times { display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
    .fs-card .fc-time { color: #fff; font-size: 1.2rem; font-weight: 600; font-variant-numeric: tabular-nums; }
    .fs-card .fc-arrow { color: rgba(255,255,255,0.4); font-size: 0.9rem; }
    .fs-card .fc-sub { font-size: 0.65rem; color: rgba(255,255,255,0.35); }
  </style>
</head>
<body>

<nav>
  <div class="pill-group">
    <button class="pill-btn active" data-tab="analog">Analog</button>
    <button class="pill-btn"        data-tab="digital">Digital</button>
  </div>
  <button id="btn-fs">Full Screen</button>
</nav>

<div id="clock-area">
  <div id="page-analog" class="clock-page active">
    <div id="analog-wrap"><canvas id="analog-canvas"></canvas></div>
  </div>
  <div id="page-digital" class="clock-page">
    <div id="digital-wrap">
      <div id="digital-time">00:00:00</div>
      <div id="digital-date"></div>
    </div>
  </div>
</div>

<div id="calc-panel">
  <div class="calc-row">
    <div class="calc-mode-toggle">
      <button class="mode-btn active" data-mode="forward">From Start Time</button>
      <button class="mode-btn"        data-mode="backward">From End Time</button>
    </div>
    <div class="field" id="field-time">
      <label id="time-label">Start Time</label>
      <input type="time" id="inp-time" value="09:00">
    </div>
    <div class="field">
      <label>Paper Length</label>
      <div class="dur-row">
        <input type="number" id="inp-h" min="0" max="9" value="0">
        <span>h</span>
        <input type="number" id="inp-m" min="0" max="59" value="75">
        <span>min</span>
      </div>
    </div>
    <button id="btn-calc">Calculate</button>
  </div>

  <div id="results-grid">
    <!-- Normal -->
    <div class="res-card">
      <div class="res-type">Normal</div>
      <div class="res-row">
        <div class="res-block"><div class="res-lbl">Start</div><div class="res-val" id="n-start">—</div></div>
        <span class="res-arrow">→</span>
        <div class="res-block"><div class="res-lbl">End</div><div class="res-val" id="n-end">—</div></div>
      </div>
    </div>
    <!-- 25% ET -->
    <div class="res-card">
      <div class="res-type">25% Extra Time</div>
      <div class="res-row">
        <div class="res-block"><div class="res-lbl">Start</div><div class="res-val" id="e25-start">—</div></div>
        <span class="res-arrow">→</span>
        <div class="res-block"><div class="res-lbl">End</div><div class="res-val" id="e25-end">—</div></div>
      </div>
    </div>
    <!-- 50% ET -->
    <div class="res-card">
      <div class="res-type">50% Extra Time</div>
      <div class="res-row">
        <div class="res-block"><div class="res-lbl">Start</div><div class="res-val" id="e50-start">—</div></div>
        <span class="res-arrow">→</span>
        <div class="res-block"><div class="res-lbl">End</div><div class="res-val" id="e50-end">—</div></div>
      </div>
    </div>
  </div>
</div>

<!-- Fullscreen overlay bar -->
<div id="fs-bar">
  <div class="fs-card">
    <div class="fc-type">Normal</div>
    <div class="fc-times">
      <span class="fc-time" id="fs-n-start">—</span>
      <span class="fc-arrow">→</span>
      <span class="fc-time" id="fs-n-end">—</span>
    </div>
  </div>
  <div class="fs-card">
    <div class="fc-type">25% Extra Time</div>
    <div class="fc-times">
      <span class="fc-time" id="fs-e25-start">—</span>
      <span class="fc-arrow">→</span>
      <span class="fc-time" id="fs-e25-end">—</span>
    </div>
  </div>
  <div class="fs-card">
    <div class="fc-type">50% Extra Time</div>
    <div class="fc-times">
      <span class="fc-time" id="fs-e50-start">—</span>
      <span class="fc-arrow">→</span>
      <span class="fc-time" id="fs-e50-end">—</span>
    </div>
  </div>
</div>

<script>
// ── Tabs ──────────────────────────────────────
document.querySelectorAll('.pill-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.pill-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.clock-page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-' + btn.dataset.tab).classList.add('active');
    resizeCanvas();
  });
});

// ── Fullscreen ─────────────────────────────────
let isFs = false;
let hasResults = false;

document.getElementById('btn-fs').addEventListener('click', () => {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(() => {});
  else document.exitFullscreen();
});

document.addEventListener('fullscreenchange', () => {
  isFs = !!document.fullscreenElement;
  document.body.classList.toggle('dark', isFs);
  document.body.classList.toggle('fs-mode', isFs);
  document.getElementById('btn-fs').textContent = isFs ? 'Exit Full Screen' : 'Full Screen';
  document.getElementById('fs-bar').classList.toggle('show', isFs && hasResults);
  resizeCanvas();
});

// ── Digital ────────────────────────────────────
const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
function updateDigital() {
  const n = new Date(), p = v => String(v).padStart(2,'0');
  document.getElementById('digital-time').textContent = `${p(n.getHours())}:${p(n.getMinutes())}:${p(n.getSeconds())}`;
  document.getElementById('digital-date').textContent = `${DAYS[n.getDay()]}  ${n.getDate()} ${MONTHS[n.getMonth()]} ${n.getFullYear()}`;
}
setInterval(updateDigital, 1000);
updateDigital();

// ── Analog ─────────────────────────────────────
const canvas = document.getElementById('analog-canvas');
const ctx    = canvas.getContext('2d');

function resizeCanvas() {
  const wrap = document.getElementById('analog-wrap');
  const size = Math.min(wrap.clientWidth, wrap.clientHeight);
  if (size < 1) return;
  const dpr = window.devicePixelRatio || 1;
  canvas.width  = size * dpr;
  canvas.height = size * dpr;
  canvas.style.width  = size + 'px';
  canvas.style.height = size + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

new ResizeObserver(resizeCanvas).observe(document.getElementById('analog-wrap'));
resizeCanvas();

function drawHand(cx, cy, angle, len, hw, color) {
  const co = Math.cos(angle), si = Math.sin(angle);
  const pc = Math.cos(angle + Math.PI/2), ps = Math.sin(angle + Math.PI/2);
  ctx.beginPath();
  ctx.moveTo(cx + co * len, cy + si * len);
  ctx.lineTo(cx + pc * hw * 0.6 + co * hw * 0.3, cy + ps * hw * 0.6 + si * hw * 0.3);
  ctx.lineTo(cx + pc * hw * 0.25 - co * hw * 0.4, cy + ps * hw * 0.25 - si * hw * 0.4);
  ctx.lineTo(cx - co * hw * 0.55, cy - si * hw * 0.55);
  ctx.lineTo(cx - pc * hw * 0.25 - co * hw * 0.4, cy - ps * hw * 0.25 - si * hw * 0.4);
  ctx.lineTo(cx - pc * hw * 0.6 + co * hw * 0.3, cy - ps * hw * 0.6 + si * hw * 0.3);
  ctx.closePath();
  ctx.fillStyle = color;
  ctx.fill();
}

function drawClock() {
  const sz = canvas.width / (window.devicePixelRatio || 1);
  const cx = sz / 2, cy = sz / 2, R = sz * 0.44;

  ctx.clearRect(0, 0, sz, sz);

  // Face
  ctx.beginPath(); ctx.arc(cx, cy, R, 0, 2*Math.PI);
  ctx.fillStyle = '#ffffff'; ctx.fill();

  // Outer rim
  ctx.beginPath(); ctx.arc(cx, cy, R, 0, 2*Math.PI);
  ctx.strokeStyle = '#c0c0c0'; ctx.lineWidth = R * 0.04; ctx.stroke();

  // Subtle inner shadow ring
  ctx.beginPath(); ctx.arc(cx, cy, R - R * 0.04, 0, 2*Math.PI);
  ctx.strokeStyle = '#e8e8e8'; ctx.lineWidth = 1; ctx.stroke();

  // Tick marks
  for (let i = 0; i < 60; i++) {
    const a = (i / 60) * 2 * Math.PI - Math.PI / 2;
    const isHour = i % 5 === 0;
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(a) * R * 0.96, cy + Math.sin(a) * R * 0.96);
    ctx.lineTo(cx + Math.cos(a) * (isHour ? R * 0.84 : R * 0.90), cy + Math.sin(a) * (isHour ? R * 0.84 : R * 0.90));
    ctx.strokeStyle = '#1a1a1a';
    ctx.lineWidth = isHour ? R * 0.022 : R * 0.007;
    ctx.lineCap = 'butt';
    ctx.stroke();
  }

  // Numbers
  ctx.fillStyle = '#1a1a1a';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = `bold ${R * 0.18}px 'Segoe UI', Arial, sans-serif`;
  for (let i = 1; i <= 12; i++) {
    const a = (i / 12) * 2 * Math.PI - Math.PI / 2;
    ctx.fillText(i, cx + Math.cos(a) * R * 0.71, cy + Math.sin(a) * R * 0.71);
  }

  const now = new Date();
  const s  = now.getSeconds() + now.getMilliseconds() / 1000;
  const m  = now.getMinutes() + s / 60;
  const h  = (now.getHours() % 12) + m / 60;

  drawHand(cx, cy, (h  / 12) * 2 * Math.PI - Math.PI / 2, R * 0.5,  R * 0.036, '#1a1a1a');
  drawHand(cx, cy, (m  / 60) * 2 * Math.PI - Math.PI / 2, R * 0.72, R * 0.022, '#1a1a1a');

  // Second hand
  const sa = (s / 60) * 2 * Math.PI - Math.PI / 2;
  ctx.save();
  ctx.strokeStyle = '#d42020'; ctx.lineWidth = R * 0.011; ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(cx - Math.cos(sa) * R * 0.22, cy - Math.sin(sa) * R * 0.22);
  ctx.lineTo(cx + Math.cos(sa) * R * 0.82, cy + Math.sin(sa) * R * 0.82);
  ctx.stroke();
  ctx.restore();

  ctx.beginPath(); ctx.arc(cx, cy, R * 0.03, 0, 2*Math.PI); ctx.fillStyle = '#d42020'; ctx.fill();
  ctx.beginPath(); ctx.arc(cx, cy, R * 0.012, 0, 2*Math.PI); ctx.fillStyle = '#1a1a1a'; ctx.fill();
}

(function loop() { drawClock(); requestAnimationFrame(loop); })();

// ── Calculator ─────────────────────────────────
let calcMode = 'forward'; // 'forward' = from start, 'backward' = from end

document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    calcMode = btn.dataset.mode;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('time-label').textContent =
      calcMode === 'forward' ? 'Start Time' : 'End Time';
    document.getElementById('inp-time').value =
      calcMode === 'forward' ? '09:00' : '10:15';
  });
});

function toMins(timeStr) {
  const [h, m] = timeStr.split(':').map(Number);
  return h * 60 + m;
}

function fromMins(totalMins) {
  const pad = n => String(n).padStart(2, '0');
  const t = ((totalMins % 1440) + 1440) % 1440;
  const frac = totalMins - Math.floor(totalMins);
  const secs = Math.round(frac * 60);
  if (secs > 0) {
    return `${pad(Math.floor(t / 60))}:${pad(Math.floor(t % 60))}:${pad(secs)}`;
  }
  return `${pad(Math.floor(t / 60))}:${pad(Math.floor(t % 60))}`;
}

document.getElementById('btn-calc').addEventListener('click', () => {
  const timeVal  = document.getElementById('inp-time').value;
  const lenH     = parseInt(document.getElementById('inp-h').value) || 0;
  const lenM     = parseInt(document.getElementById('inp-m').value) || 0;
  const lenMins  = lenH * 60 + lenM;
  if (!timeVal || lenMins <= 0) return;

  const refMins = toMins(timeVal);

  let startMins, endMins;
  if (calcMode === 'forward') {
    startMins = refMins;
    endMins   = refMins + lenMins;
  } else {
    endMins   = refMins;
    startMins = refMins - lenMins;
  }

  const e25End = startMins + lenMins * 1.25;
  const e50End = startMins + lenMins * 1.50;

  const fmt = fromMins;
  const start = fmt(startMins);
  const end   = fmt(endMins);
  const end25 = fmt(e25End);
  const end50 = fmt(e50End);

  // Panel
  document.getElementById('n-start').textContent   = start;
  document.getElementById('n-end').textContent     = end;
  document.getElementById('e25-start').textContent = start;
  document.getElementById('e25-end').textContent   = end25;
  document.getElementById('e50-start').textContent = start;
  document.getElementById('e50-end').textContent   = end50;
  document.getElementById('results-grid').classList.add('show');

  // Fullscreen bar
  document.getElementById('fs-n-start').textContent   = start;
  document.getElementById('fs-n-end').textContent     = end;
  document.getElementById('fs-e25-start').textContent = start;
  document.getElementById('fs-e25-end').textContent   = end25;
  document.getElementById('fs-e50-start').textContent = start;
  document.getElementById('fs-e50-end').textContent   = end50;

  hasResults = true;
  if (isFs) document.getElementById('fs-bar').classList.add('show');
});
</script>
</body>
</html>
